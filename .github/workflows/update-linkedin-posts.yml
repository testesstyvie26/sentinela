name: Atualizar postagens LinkedIn

on:
  schedule:
    - cron: '*/15 * * * *'   # A cada 15 min para atualização quasi tempo real
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Atualizar postagens
        run: |
          if [ -f scripts/update-posts.js ]; then node scripts/update-posts.js; fi
          git add posts.json 2>/dev/null || true
          if ! git diff --staged --quiet 2>/dev/null; then
            git config user.email "actions@github.com"
            git config user.name "GitHub Actions"
            git commit -m "chore: atualizar postagens LinkedIn [$(date -u +%H:%M)]"
            git push
          fi
